<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Editor</title>
    <link rel="stylesheet" th:href="@{/css/codemirror.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="app-header">
    <div class="app-title">
        <svg class="app-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Mermaid Editor">
            <circle cx="16" cy="6"  r="4" fill="#4fc3f7"/>
            <circle cx="6"  cy="26" r="4" fill="#81c784"/>
            <circle cx="26" cy="26" r="4" fill="#f06292"/>
            <line x1="16" y1="10" x2="6"  y2="22" stroke="#4fc3f7" stroke-width="1.5"/>
            <line x1="16" y1="10" x2="26" y2="22" stroke="#4fc3f7" stroke-width="1.5"/>
            <line x1="6"  y1="26" x2="26" y2="26" stroke="#81c784" stroke-width="1.5" stroke-dasharray="3 2"/>
        </svg>
        <span>Mermaid Editor</span>
    </div>
    <div class="app-actions">
        <button id="btn-export" class="btn btn-ghost" title="Скачать SVG">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
                <path d="M10 3v10M6 9l4 4 4-4M4 15h12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Скачать SVG
        </button>
        <button id="btn-settings" class="btn btn-ghost" title="Настройки">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
                <circle cx="10" cy="10" r="2.5"/>
                <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
            </svg>
            Настройки
        </button>
    </div>
</header>

<main class="split-layout">

    <div class="pane pane-editor">
        <div class="pane-header">
            <span>Код</span>
            <span class="hint">Ctrl+Enter — обновить</span>
        </div>
        <textarea id="code-editor">graph TD
    A[Начало] --> B{Условие?}
    B -->|Да| C[Выполнить действие]
    B -->|Нет| D[Конец]
    C --> D</textarea>
    </div>

    <div class="split-divider" id="divider"></div>

    <div class="pane pane-preview">
        <div class="pane-header">
            <span>Превью</span>
            <span id="render-status" class="render-status"></span>
        </div>
        <div class="preview-scroll" id="preview-scroll">
            <div id="diagram-output"></div>
        </div>
    </div>

</main>

<div class="settings-overlay" id="settings-overlay"></div>

<aside class="settings-panel" id="settings-panel" aria-label="Настройки диаграммы">
    <div class="settings-header">
        <h2>Настройки</h2>
        <button id="btn-close-settings" class="btn-icon" aria-label="Закрыть">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M5 5l10 10M15 5L5 15" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <div class="settings-body">
        <section class="settings-section">
            <h3>Общие</h3>
            <label class="field-label">Тема
                <select id="s-theme" name="theme">
                    <option value="default">Default</option>
                    <option value="dark">Dark</option>
                    <option value="forest">Forest</option>
                    <option value="neutral">Neutral</option>
                    <option value="base">Base</option>
                </select>
            </label>
            <label class="field-label">Шрифт
                <input type="text" id="s-fontFamily" name="fontFamily">
            </label>
            <label class="field-label">Размер шрифта (px)
                <input type="number" id="s-fontSize" name="fontSize" min="8" max="72">
            </label>
            <label class="field-label checkbox-label">
                <input type="checkbox" id="s-htmlLabels" name="htmlLabels">
                <span>HTML Labels <em>(перенос текста в узлах)</em></span>
            </label>
            <label class="field-label">Security Level
                <select id="s-securityLevel" name="securityLevel">
                    <option value="strict">Strict</option>
                    <option value="loose">Loose</option>
                    <option value="antiscript">Antiscript</option>
                </select>
            </label>
            <label class="field-label">Max Text Size
                <input type="number" id="s-maxTextSize" name="maxTextSize" min="1000" max="500000" step="1000">
            </label>
        </section>

        <section class="settings-section">
            <h3>Flowchart</h3>
            <label class="field-label">Node Spacing (px)
                <input type="number" id="s-nodeSpacing" name="flowchartNodeSpacing" min="10" max="500">
            </label>
            <label class="field-label">Rank Spacing (px)
                <input type="number" id="s-rankSpacing" name="flowchartRankSpacing" min="10" max="500">
            </label>
            <label class="field-label">Wrapping Width (px)
                <input type="number" id="s-wrappingWidth" name="flowchartWrappingWidth" min="50" max="2000">
            </label>
            <label class="field-label">Curve
                <select id="s-curve" name="flowchartCurve">
                    <option value="basis">Basis (плавный)</option>
                    <option value="linear">Linear (угловой)</option>
                    <option value="cardinal">Cardinal</option>
                </select>
            </label>
        </section>

        <section class="settings-section">
            <h3>Sequence</h3>
            <label class="field-label">Message Margin (px)
                <input type="number" id="s-msgMargin" name="sequenceMessageMargin" min="5" max="200">
            </label>
            <label class="field-label checkbox-label">
                <input type="checkbox" id="s-mirrorActors" name="sequenceMirrorActors">
                <span>Mirror Actors</span>
            </label>
            <label class="field-label">Box Margin (px)
                <input type="number" id="s-boxMargin" name="sequenceBoxMargin" min="0" max="100">
            </label>
        </section>

        <section class="settings-section">
            <h3>ER Diagram</h3>
            <label class="field-label">Entity Padding (px)
                <input type="number" id="s-erPadding" name="erEntityPadding" min="0" max="100">
            </label>
            <label class="field-label">Layout Direction
                <select id="s-erDirection" name="erLayoutDirection">
                    <option value="TB">TB — сверху вниз</option>
                    <option value="BT">BT — снизу вверх</option>
                    <option value="LR">LR — слева направо</option>
                    <option value="RL">RL — справа налево</option>
                </select>
            </label>
        </section>

        <section class="settings-section">
            <h3>Вид</h3>
            <label class="field-label">Padding диаграммы (px)
                <input type="number" id="s-diagramPadding" name="diagramPadding" min="0" max="100">
            </label>
            <label class="field-label">Масштаб (%)
                <input type="number" id="s-zoom" name="zoomPercent" min="10" max="300">
            </label>
        </section>
    </div>

    <div class="settings-footer">
        <button id="btn-reset-settings" class="btn btn-ghost">Сброс</button>
        <button id="btn-save-settings" class="btn btn-primary">Применить</button>
    </div>
</aside>

<script th:src="@{/js/codemirror.min.js}"></script>
<script th:src="@{/js/mermaid.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
